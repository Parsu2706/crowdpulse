name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies (binary only)
        run: |
          pip install \
            --prefer-binary \
            --only-binary=:all: \
            -r requirements.txt \
            -c constraints.txt

      - name: Syntax check
        run: python -m compileall .
